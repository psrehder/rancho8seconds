<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rancho8seconds</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>
    <header class="top-banner">
        <img src="logo.png" alt="Rancho 8 Segundos" />
    </header>

    <main class="page-layout">
        <aside class="sidebar action-panel">
            <div class="sidebar-card compact">
                <button class="btn btn-secondary full-width" id="btnExportJson">Exportar</button>
                <button class="btn btn-secondary full-width" id="btnImportJson">Importar</button>
                <button class="btn btn-secondary full-width" id="btnShareLink">Compartilhar dados</button>
                <button class="btn btn-secondary full-width" id="btnResetData">Limpar</button>
                <input type="file" id="fileInput" accept=".json" style="display:none;">
            </div>
        </aside>

        <section class="content">
            <section class="scores-panel">
                <div class="panel-header">
                <h2>Ranking de Duplas</h2>
                <p>Totais por dupla e partidas registradas.</p>
            </div>
            <div class="scores-grid" id="scoresGrid"></div>
        </section>

        <section class="panel matches-panel">
            <div class="panel-header">
                <h2>Partidas</h2>
                <div class="matches-meta">
                    <span id="matchesCount">0 partidas</span>
                    <span id="playersCount">0 duplas</span>
                </div>
            </div>
            <div class="inline-actions">
                <form id="formPlayer" class="inline-form">
                    <label for="playerName">Nova dupla</label>
                    <div class="inline-row">
                        <input type="text" id="playerName" placeholder="Nome da dupla" required>
                        <button type="submit" class="btn btn-secondary">Adicionar dupla</button>
                    </div>
                </form>
                <form id="formMatch" class="inline-form">
                    <label>Registrar partida</label>
                    <div class="match-inputs">
                        <input type="date" id="matchDate" required>
                        <select id="playerA" required></select>
                        <input type="number" id="scoreA" min="0" value="0" placeholder="Pts A" required>
                        <span class="vs">x</span>
                        <select id="playerB" required></select>
                        <input type="number" id="scoreB" min="0" value="0" placeholder="Pts B" required>
                        <button type="submit" class="btn btn-primary">Salvar partida</button>
                    </div>
                </form>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Dupla A</th>
                            <th>Pts A</th>
                            <th>Dupla B</th>
                            <th>Pts B</th>
                            <th>Vencedor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="matchesTable"></tbody>
                </table>
            </div>
        </section>
        </section>
    </main>

    <div class="modal-backdrop" id="modalShare">
        <div class="modal-card share-card">
            <h3>Compartilhar Placar</h3>
            <p>Copie o link ou envie o QR Code para que outro jogador importe o placar atual.</p>
            <canvas id="qrCodeCanvas"></canvas>
            <input type="text" id="shareLinkInput" readonly>
            <button class="btn btn-primary" id="btnCopyLink">Copiar Link</button>
            <button type="button" class="btn btn-secondary closeModal">Fechar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
